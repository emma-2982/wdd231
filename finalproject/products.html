    <meta property="og:image" content="https://emma-2982.github.io/wdd231/finalproject/images/site-logo.jpg">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.ico/favicon.ico">
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/small.css">
    <link rel="stylesheet" href="styles/large.css">
    <script type="module" src="scripts/products.js"></script>
    <script src="scripts/dates.js" defer></script>

<body>

    <header>
        <img src="images/site-logo.jpg" alt="Jamila's Cake House logo" width="80">

        <h1>Jamila's Cake House</h1>

        <button id="menu" aria-label="Open menu"></button>

        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html" class="active">Products</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <!-- HERO -->
        <section class="hero">
            <img src="images/hero.jpg" alt="Luxury cakes display">

            <div class="hero-text">
                <h2>Our Cake Collection</h2>
                <p>Elegant handcrafted cakes for every celebration.</p>
            </div>
        </section>

        <!-- SEARCH -->
        <section>
            <h2>Find Your Perfect Cake</h2>

            <input type="text" id="search" placeholder="Search cakes by name...">
        </section>

        <!-- PRODUCTS GRID -->
        <section>
            <h2>All Products</h2>
            <div id="products-grid" class="grid"></div>
        </section>

        <!-- MODAL -->
        <dialog id="cakeModal">
            <div id="modalContent"></div>
            <button id="closeModal">Close</button>
        </dialog>

    </main>

    <footer>
        <div class="social">
            <a href="https://github.com/emma-2982">
                <img src="images/github.jpg" alt="Github">
            </a>
    
            <a href="https://www.instagram.com/">
                <img src="images/instagram.jpg" alt="Instagram">
            </a>
    
            <a href="https://web.whatsapp.com/">
                <img src="images/whatapp.jpg" alt="Whatsapp">
    
            </a>
    
            <a href="https://www.linkedin.com/feed/">
                <img src="images/linkedin.jpg" alt="LinkedIn">
            </a>
    
            <p>Video Demonstration:
                <a href="https://www.youtube.com/shorts/nBK25NlJXF8?feature=share" target="_blank">
                    Watch Here
                </a>
            <p>
                © <span id="year"></span> Jamila's Cake House • Ghana
