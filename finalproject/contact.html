<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Jamila's Cake House</title>
    <meta property="og:title" content="jamila's Cake House ">
    <meta property="og:description" content="This website is to promote a local cake business by showing its products, services, and contact information. The website will allow customers to explore available cakes, view prices, and learn how to place orders.">
    <meta property="og:url" content=" https://emma-2982.github.io/wdd231/finalproject/index.html">
    <meta property="og:image" content="https://emma-2982.github.io/wdd231/finalproject/images/site-logo.jpg">
    <link rel="icon" href="favicon.ico/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/small.css">
    <link rel="stylesheet" href="styles/large.css">
    <link rel="icon" href="favicon.ico/favicon.ico">
    <script type="module" src="scripts/main.js"></script>
    <script src="scripts/dates.js" defer></script>
</head>

<body>

    <header>
        <img src="images/site-logo.jpg" alt="Jamila's Cake House logo" width="80">
        <h1>Jamila's Cake House</h1>
        <button id="menu" class="hamburger"></button>

        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section class="contact-hero">
            <h2>Get in Touch</h2>
            <p>We'd love to hear from you! Send us a message or place an order.</p>
        </section>

        <section class="contact-form-section">
            <form class="contact-form">
                <label>
                    Name:
                    <input type="text" name="name" required>
                </label>

                <label>
                    Email:
                    <input type="email" name="email" required>
                </label>

                <label>
                    Message:
                    <textarea name="message" rows="5" required></textarea>
                </label>

                <button type="submit" class="btn-primary">Send Message</button>
            </form>
        </section>

    </main>

    <footer>
        <p>&copy; <span id="year"></span> Jamila's Cake House</p>
        <a href="attributions.html">Attributions</a>
        <p>Video Demonstration:
            <a href="https://www.youtube.com/shorts/nBK25NlJXF8?feature=share" target="_blank">
                Watch Here
            </a>
            <p>
                © <span id="year"></span> Emmanuel Kofi Teye • Ghana
            </p>
            <p id="lastModified"></p>

    </footer>

</body>

</html>
